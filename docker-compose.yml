
services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./mafia.db:/app/mafia.db
      - ./mafia.log:/app/mafia.log
    depends_on:
      - redis
    networks:
      - mafia_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - mafia_net
    command: redis-server --save 60 1 --loglevel warning

volumes:
  redis_data:

networks:
  mafia_net:
    driver: bridge
